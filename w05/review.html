<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Submitted</title>
  <meta name="description" content="Thank you page for submitted product review.">
  <link rel="stylesheet" href="styles/form.css">
</head>
<body>
  <header>
    <h1>Thank You for Your Review</h1>
  </header>

  <main>
    <div class="form-container">
      <p>Your review has been submitted successfully.</p>

      <h2>Review Details</h2>
      <ul id="review-details"></ul>

      <p id="review-count"></p>
      <p id="submitted-date"></p>
    </div>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> | WDD 131 | Product Review</p>
  </footer>

  <script>
    function setCurrentYear() {
      const yearSpan = document.querySelector("#year");
      const year = new Date().getFullYear();
      yearSpan.textContent = year;
    }

    function showReviewDetails() {
      const params = new URLSearchParams(window.location.search);
      const detailsList = document.querySelector("#review-details");

      const product = params.get("product") || "Not provided";
      const rating = params.get("rating") || "Not provided";
      const installed = params.get("installed") || "Not provided";
      const review = params.get("review") || "Not provided";
      const name = params.get("name") || "Anonymous";

      const features = params.getAll("features");
      const featuresText = features.length ? features.join(", ") : "None selected";

      const items = [
        `Product ID: ${product}`,
        `Rating: ${rating} stars`,
        `Date of Installation: ${installed}`,
        `Features: ${featuresText}`,
        `Written Review: ${review}`,
        `Name: ${name}`
      ];

      items.forEach(text => {
        const li = document.createElement("li");
        li.textContent = text;
        detailsList.appendChild(li);
      });
    }

    function updateReviewCount() {
      const key = "reviewCount";
      let count = Number(localStorage.getItem(key)) || 0;
      count += 1;
      localStorage.setItem(key, count);
      const countParagraph = document.querySelector("#review-count");
      countParagraph.textContent = `Total reviews submitted from this browser: ${count}`;
    }

    function showSubmittedDate() {
      const p = document.querySelector("#submitted-date");
      const now = new Date();
      p.textContent = `Review submitted on: ${now.toLocaleString()}`;
    }

    document.addEventListener("DOMContentLoaded", () => {
      setCurrentYear();
      showReviewDetails();
      updateReviewCount();
      showSubmittedDate();
    });
  </script>
</body>
</html>
